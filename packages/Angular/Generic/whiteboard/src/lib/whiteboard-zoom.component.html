<div class="zoom-cluster">
  <button type="button" title="Zoom out (hold for continuous)"
          (pointerdown)="OnZoomPressStart($event, -1)"
          (pointerup)="OnZoomPressEnd()"
          (pointerleave)="OnZoomPressEnd()"
          (pointercancel)="OnZoomPressEnd()"
          (click)="OnZoomClick(-1)"><i class="fa-solid fa-minus"></i></button>
  <span class="zoom-pct">{{ ZoomPercent }}%</span>
  <button type="button" title="Zoom in (hold for continuous)"
          (pointerdown)="OnZoomPressStart($event, 1)"
          (pointerup)="OnZoomPressEnd()"
          (pointerleave)="OnZoomPressEnd()"
          (pointercancel)="OnZoomPressEnd()"
          (click)="OnZoomClick(1)"><i class="fa-solid fa-plus"></i></button>
  <span class="zoom-sep"></span>
  <button type="button" title="Fit to content" (click)="Fit.emit()"><i class="fa-solid fa-compress"></i></button>
  <button type="button" title="Mini-map" [class.on]="MinimapOpen" (click)="ToggleMinimap.emit()"><i class="fa-regular fa-map"></i></button>
</div>
