<div class="filter-panel">
  <div class="filter-panel-header">
    <h3>Entity Filters</h3>
    <div class="filter-summary-inline">
      <span class="summary-value">{{ filteredEntities.length }}</span>
      <span class="summary-label">of {{ entities.length }}</span>
    </div>
    <button type="button" mjButton variant="icon" size="sm" (click)="toggleFilterPanel()" aria-label="Close filter panel">
      <i class="fa-solid fa-times" aria-hidden="true"></i>
    </button>
  </div>

  <div class="filter-content">
    <!-- Schema Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <i class="fa-solid fa-database" aria-hidden="true"></i>
        Schema
      </label>
      <mj-dropdown
        class="filter-dropdown"
        [Data]="schemaOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [ngModel]="filters.schemaName"
        (ValueChange)="onSchemaChange($event)">
      </mj-dropdown>
    </div>

    <!-- Entity Name Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        Entity Name
      </label>
      <input
        type="text"
        class="mj-input filter-input"
        [(ngModel)]="filters.entityName"
        (ngModelChange)="onFilterChange()"
        placeholder="Search entities...">
    </div>

    <!-- Base Table Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <i class="fa-solid fa-table" aria-hidden="true"></i>
        Base Table
      </label>
      <input
        type="text"
        class="mj-input filter-input"
        [(ngModel)]="filters.baseTable"
        (ngModelChange)="onFilterChange()"
        placeholder="Search tables...">
    </div>

    <!-- Entity Status Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
        Status
      </label>
      <mj-dropdown
        class="filter-dropdown"
        [Data]="statusOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [ngModel]="filters.entityStatus"
        (ValueChange)="onStatusChange($event)">
      </mj-dropdown>
    </div>

    <!-- Reset Button -->
    <div class="filter-actions">
      <button type="button" mjButton variant="secondary" size="md" class="reset-btn" (click)="resetAllFilters()" title="Reset all filters">
        <i class="fa-solid fa-arrow-rotate-left" aria-hidden="true"></i>
        Reset Filters
      </button>
    </div>
  </div>
</div>
