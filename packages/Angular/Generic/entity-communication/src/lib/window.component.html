@if (DialogVisible) {
    <mj-window
        [Visible]="true"
        [Width]="Width"
        [Height]="Height"
        [MinWidth]="MinWidth"
        [MinHeight]="MinHeight"
        [Title]="Title"
        (Close)="OnCancel()"
        [Resizable]="Resizable"
    >
        <mj-entity-communications-preview
            [entityInfo]="entityInfo"
            [runViewParams]="runViewParams"
        >
        </mj-entity-communications-preview>
    </mj-window>
}
