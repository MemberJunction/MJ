<div class="board-toolbar">
  @for (entry of Tools; track entry.Tool) {
    <button type="button"
            class="tool"
            [class.active]="ActiveTool === entry.Tool"
            [title]="entry.Title"
            (click)="SelectTool(entry.Tool)">
      <i [class]="entry.Icon"></i><span class="kbd">{{ entry.Kbd }}</span>

      @if (entry.Tool === 'pen' && ActiveTool === 'pen') {
        <span class="pen-flyout" (click)="$event.stopPropagation()">
          @for (color of PenColors; track color) {
            <span class="pen-c"
                  [class.sel]="PenColor === color"
                  [style.background]="color"
                  (click)="PenColorChange.emit(color)"></span>
          }
          <span class="pen-w">
            @for (width of PenWidths; track width; let i = $index) {
              <span [class]="'w' + (i + 1)"
                    [class.sel]="PenWidth === width"
                    (click)="PenWidthChange.emit(width)"></span>
            }
          </span>
          <span class="pen-note">violet = {{ AgentName }}'s</span>
        </span>
      }

      @if (entry.Tool === 'shape' && ActiveTool === 'shape') {
        <span class="pen-flyout shape-flyout" (click)="$event.stopPropagation()">
          @for (shape of ShapeKinds; track shape.Kind) {
            <span class="shape-c"
                  [class.sel]="ShapeKind === shape.Kind"
                  [title]="shape.Title"
                  (click)="ShapeKindChange.emit(shape.Kind)"><i [class]="shape.Icon"></i></span>
          }
          <span class="pen-note">drag to draw</span>
        </span>
      }
    </button>
  }

  <div class="tool-sep"></div>
  <button type="button" class="tool" title="Undo" [disabled]="!CanUndo" (click)="Undo.emit()">
    <i class="fa-solid fa-rotate-left"></i>
  </button>
  <button type="button" class="tool" title="Redo" [disabled]="!CanRedo" (click)="Redo.emit()">
    <i class="fa-solid fa-rotate-right"></i>
  </button>
</div>
