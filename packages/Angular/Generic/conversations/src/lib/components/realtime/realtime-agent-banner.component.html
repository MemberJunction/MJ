<div class="banner">
  <div class="agent-orb" [attr.data-state]="OrbState(State)" aria-hidden="true"></div>

  <div class="banner__id">
    <span class="banner__name">Voice for {{ AgentName }}</span>
    <span class="pill pill--sage"><i class="fa-solid fa-feather" aria-hidden="true"></i> Co-Agent</span>
    <span class="banner__for">speaking as <b>{{ AgentName }}</b></span>
    @if (ModelName) {
      <span class="banner__model" [title]="'Realtime voice model: ' + ModelName">· {{ ModelName }}</span>
    }
    @if (ShowOpenSession) {
      <button type="button" class="dev-link" (click)="OpenSession()"
              title="Open the agent session record">
        <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
        <span>Open session</span>
      </button>
    }
  </div>

  <div class="banner__state" [class.banner__state--busy]="IsBusy(State)">
    @if (IsBusy(State)) {
      <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
    } @else {
      <div class="waveform" [class.waveform--idle]="State !== 'speaking'" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    }
    <span class="banner__state-label">{{ StateLabel(State) }}</span>
  </div>
</div>
