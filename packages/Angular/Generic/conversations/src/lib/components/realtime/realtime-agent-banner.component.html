<div class="banner">
  <div class="agent-orb" [attr.data-state]="OrbState(State)" aria-hidden="true"></div>

  <div class="banner__id">
    <div class="banner__name">
      Voice for {{ AgentName }}
      <span class="pill pill--sage"><i class="fa-solid fa-feather" aria-hidden="true"></i> Co-Agent</span>
    </div>
    <div class="banner__for">Speaking as <b>{{ AgentName }}</b> · the ambient helper in MemberJunction</div>
  </div>

  <div class="banner__state" [class.banner__state--busy]="IsBusy(State)">
    @if (IsBusy(State)) {
      <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
    } @else {
      <div class="waveform" [class.waveform--idle]="State !== 'speaking'" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    }
    <span class="banner__state-label">{{ StateLabel(State) }}</span>
  </div>
</div>
