@if (ConnectionState$ | async; as state) {
  <div class="call-overlay" role="region" aria-label="Live voice session">

    <!-- MAIN column: banner → thread → channel strip → in-call composer → controls -->
    <div class="call-main">
      <mj-realtime-agent-banner [State]="state" [AgentName]="AgentName" [ModelName]="ModelName$ | async"></mj-realtime-agent-banner>

      <!-- Ephemeral narration with no active working card to anchor to → under the banner -->
      @if (State.Narration && !State.ActiveCallId) {
        <div class="banner-live-note" role="status" aria-live="polite">
          <i class="fa-solid fa-comment-dots" aria-hidden="true"></i>
          {{ State.Narration }}
        </div>
      }

      <div class="call-body">
        @if (state === 'connecting') {
          <div class="call-connecting">
            <mj-loading text="Connecting to the live session…" size="medium"></mj-loading>
          </div>
        } @else {
          <mj-realtime-session-thread
            [State]="State"
            [AgentName]="AgentName"
            [ShowCaptions]="ShowCaptions">
          </mj-realtime-session-thread>
        }
      </div>

      <!-- Active channels -->
      <mj-realtime-channel-strip></mj-realtime-channel-strip>

      <!-- In-session text composer (joins the SAME call) -->
      <mj-realtime-composer></mj-realtime-composer>

      <!-- Call controls -->
      <mj-realtime-controls
        [CaptionsOn]="ShowCaptions"
        (CaptionsToggled)="OnCaptionsToggled($event)"
        (Ended)="OnEnded()">
      </mj-realtime-controls>
    </div>

    <!-- RIGHT RAIL: all tool/agent calls of the session, newest first (collapsible) -->
    <mj-realtime-activity-rail [State]="State"></mj-realtime-activity-rail>

  </div>
}
