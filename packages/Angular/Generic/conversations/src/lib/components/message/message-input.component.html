<div class="message-input-wrapper">
  <!-- Processing Indicator Overlay -->
  @if (isProcessing) {
    <div class="processing-indicator">
      <i class="fas fa-circle-notch fa-spin"></i>
      <span>{{ processingMessage }}</span>
    </div>
  }

  <!-- Message Input Box (mic button lives in its in-composer toolbar) -->
  <mj-message-input-box
    #inputBox
    [placeholder]="placeholder"
    [disabled]="disabled || isProcessing"
    [showCharacterCount]="false"
    [enableMentions]="enableMentions"
    [enableAttachments]="enableAttachments"
    [maxAttachments]="maxAttachments"
    [maxAttachmentSizeBytes]="maxAttachmentSizeBytes"
    [acceptedFileTypes]="acceptedFileTypes"
    [currentUser]="currentUser"
    [rows]="3"
    [enableVoice]="true"
    [voiceActive]="voiceActive"
    [canStartVoice]="canStartVoice"
    [(value)]="messageText"
    (textSubmitted)="onTextSubmitted($event)"
    (attachmentsChanged)="onAttachmentsChanged($event)"
    (attachmentError)="onAttachmentError($event)"
    (artifactPickerRequested)="onArtifactPickerRequested()"
    (voiceRequested)="onStartVoice()"
    (voiceOptionsRequested)="onVoiceOptions()">
  </mj-message-input-box>

  <!-- Voice agent/co-agent/model picker — shown when starting a call on a conversation
       with NO prior agent participation, or on demand via the caret next to the phone
       button (any conversation). Anchored above the composer. -->
  @if (showRealtimeAgentPicker) {
    <mj-realtime-agent-picker
      [Provider]="Provider"
      [Agents]="voicePickerAgents"
      [DefaultAgentId]="voicePickerDefaultAgentId"
      [CoAgents]="voicePickerCoAgents"
      [DefaultCoAgentId]="voicePickerDefaultCoAgentId"
      (AgentPicked)="onRealtimeAgentPicked($event)"
      (Cancelled)="onRealtimeAgentPickerCancelled()">
    </mj-realtime-agent-picker>
  }
</div>

<!-- The voice "call mode" overlay is hosted by <mj-conversation-chat-area> (it fills the
     whole conversation panel in place); this component only owns the trigger wiring. -->
