<div class="message-input-box-container" (click)="onContainerClick($event)">
  <div class="input-wrapper">
    <mj-mention-editor
      #mentionEditor
      [placeholder]="placeholder"
      [disabled]="disabled"
      [currentUser]="currentUser"
      [enableMentions]="enableMentions"
      [enableAttachments]="enableAttachments"
      [maxAttachments]="maxAttachments"
      [maxAttachmentSizeBytes]="maxAttachmentSizeBytes"
      [acceptedFileTypes]="acceptedFileTypes"
      [(ngModel)]="value"
      (valueChange)="onValueChange($event)"
      (enterPressed)="onEnterPressed($event)"
      (mentionSelected)="onMentionSelected($event)"
      (attachmentsChanged)="onAttachmentsChanged($event)"
      (attachmentError)="onAttachmentError($event)"
      (attachmentClicked)="onAttachmentClicked($event)">
    </mj-mention-editor>

    <!-- Attach + voice + plan-mode buttons - Positioned over editor -->
    @if (enableAttachments || enableRealtime || enablePlanMode) {
      <div class="attach-buttons">
        @if (enablePlanMode) {
        <button
          class="attach-button-icon plan-mode-button-icon"
          [class.plan-mode-button-icon--active]="planModeActive"
          [disabled]="disabled"
          [attr.aria-pressed]="planModeActive"
          (click)="planModeToggle.emit(); $event.stopPropagation()"
          [title]="planModeActive ? 'Plan Mode ON — the agent presents a plan for your approval before it acts' : 'Plan Mode: have the agent present a plan for your approval before it acts'"
          aria-label="Toggle Plan Mode"
          >
          <i class="fa-solid fa-route" aria-hidden="true"></i>
        </button>
        }
        @if (enableAttachments) {
        <button
          class="attach-button-icon"
          [disabled]="disabled"
          (click)="openFilePicker(); $event.stopPropagation()"
          title="Attach file"
          >
          <i class="fa-solid fa-paperclip"></i>
        </button>
        }
        @if (enableRealtime) {
        <button
          class="attach-button-icon voice-button-icon"
          [class.voice-button-icon--active]="voiceActive"
          [disabled]="!canStartRealtime"
          (click)="onRealtimeClick(); $event.stopPropagation()"
          [title]="voiceActive ? 'Voice call active' : 'Start a voice call'"
          aria-label="Start a voice call"
          >
          <i class="fa-solid fa-phone" aria-hidden="true"></i>
        </button>
        <!-- Caret beside the phone: opens the agent/model picker so call OPTIONS stay one
             click away while the plain phone click keeps its instant-start behavior. -->
        <button
          class="attach-button-icon voice-options-button-icon"
          [disabled]="!canStartRealtime"
          (click)="onRealtimeOptionsClick(); $event.stopPropagation()"
          title="Voice call options (choose agent and voice model)"
          aria-label="Voice call options"
          >
          <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
        </button>
        }
      </div>
    }

    <!-- Send Button (Icon Only) - Positioned over editor -->
    <button
      class="send-button-icon"
      [disabled]="!canSend"
      (click)="onSendClick()"
      title="Send message (Enter)"
      >
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>
