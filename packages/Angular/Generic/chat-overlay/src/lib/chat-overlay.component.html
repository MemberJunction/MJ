@if (!IsHidden) {
    <!-- Floating Bubble (minimized state) -->
    @if (State === 'minimized') {
        <div class="chat-bubble" (click)="Toggle()" title="Open Chat">
            <i class="fa-solid fa-comments chat-bubble-icon"></i>
            @if (UnreadCount > 0) {
                <span class="chat-badge">{{ UnreadCount > 9 ? '9+' : UnreadCount }}</span>
            }
        </div>
    }

    <!-- Expanded Chat Panel -->
    @if (State === 'expanded') {
        <div class="chat-panel">
            <!-- Panel Header -->
            <div class="chat-panel-header">
                <div class="chat-panel-title">
                    <i class="fa-solid fa-robot"></i>
                    <span>AI Assistant</span>
                </div>
                <div class="chat-panel-header-actions">
                    <button class="chat-panel-btn" title="Open in full workspace" (click)="OnOpenFullWorkspace()">
                        <i class="fa-solid fa-expand"></i>
                    </button>
                    <button class="chat-panel-btn" title="Minimize" (click)="Minimize()">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                </div>
            </div>

            <!-- Chat Content -->
            <div class="chat-panel-body">
                <mj-chat
                    [Messages]="Messages"
                    [AllowSend]="AllowSend"
                    [ShowWaitingIndicator]="ShowWaitingIndicator"
                    [Placeholder]="Placeholder"
                    (MessageAdded)="OnMessageAdded($event)"
                ></mj-chat>
            </div>
        </div>
    }
}
