@if (DialogVisible) {
    <mj-dialog
        [Visible]="true"
        [Width]="DialogWidth"
        [Height]="DialogHeight"
        [Title]="DialogTitle"
        (Close)="HandleCancelClick()"
    >
        <ng-content></ng-content>
        <mj-dialog-actions>
            @if(ShowOKButton) {
                <button mjButton variant="primary" (click)="HandleOKClick()">{{OKButtonText}}</button>
            }
            @if(ShowCancelButton) {
                <button mjButton (click)="HandleCancelClick()">{{CancelButtonText}}</button>
            }

            <!-- Named slot for custom actions/buttons -->
            <ng-content select="[custom-actions]"></ng-content>

            @if(!ShowOKButton && !ShowCancelButton && !HasCustomActions) {
                <span>No actions available - enable built-in actions or add custom actions</span>
            }
        </mj-dialog-actions>
    </mj-dialog>
}
