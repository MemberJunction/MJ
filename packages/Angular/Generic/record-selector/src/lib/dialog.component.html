@if (DialogVisible) {
    <mj-dialog
        [Visible]="true"
        [Width]="DialogWidth"
        [Height]="DialogHeight"
        [Title]="DialogTitle"
        (Close)="OnCancel()"
    >
        <mj-record-selector
            [AvailableRecords]="AvailableRecords"
            [DisplayField]="DisplayField"
            [SelectedRecords]="SelectedRecords"
            [EntityName]="EntityName"
            [DisplayIconField]="DisplayIconField"
            [UnselectedRecords]="UnselectedRecords"
        >
        </mj-record-selector>
        <mj-dialog-actions>
            <button mjButton variant="primary" (click)="OnOK()">OK</button>
            <button mjButton (click)="OnCancel()">Cancel</button>
        </mj-dialog-actions>
    </mj-dialog>
}
