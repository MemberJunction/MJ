<div class="container">
    @if (User) {
        <ag-grid-angular
            class="resources-grid"
            [theme]="GridTheme"
            [rowData]="resources"
            [columnDefs]="ColumnDefs"
            [defaultColDef]="DefaultColDef"
            [rowSelection]="RowSelectionConfig"
            [getRowId]="getRowId"
            (selectionChanged)="onSelectionChange($event)"
            (gridReady)="onGridReady($event)"
            style="width: 100%; height: 400px;">
        </ag-grid-angular>
    }
  </div>
