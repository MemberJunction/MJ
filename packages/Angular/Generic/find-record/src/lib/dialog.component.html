@if (DialogVisible) {
    <mj-dialog
        [Visible]="true"
        [Width]="DialogWidth"
        [Height]="DialogHeight"
        [Title]="DialogTitle"
        (Close)="OnCancel()"
    >
        <mj-find-record
            [EntityName]="EntityName"
            [DisplayFields]="DisplayFields"
            (OnRecordSelected)="BubbleOnRecordSelected($event)"
        >
        </mj-find-record>
        <mj-dialog-actions>
            <button mjButton variant="primary" (click)="OnOK()">OK</button>
            <button mjButton (click)="OnCancel()">Cancel</button>
        </mj-dialog-actions>
    </mj-dialog>
}
