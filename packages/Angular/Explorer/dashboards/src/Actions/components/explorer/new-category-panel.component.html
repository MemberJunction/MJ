@if (IsOpen) {
  <div class="panel-backdrop" (click)="onBackdropClick($event)">
    <div class="slide-panel" @slideIn>
      <div class="panel-header">
        <h2>
          <i class="fa-solid fa-folder-plus"></i>
          New Category
        </h2>
        <button mjButton
          variant="flat"
          (click)="onClose()">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <div class="panel-content">
        @if (Errors['general']) {
          <mj-alert Variant="error">{{ Errors['general'] }}</mj-alert>
        }

        <div class="form-group">
          <label for="categoryName" class="form-label required">
            Category Name
          </label>
          <input type="text" class="mj-input"
            id="categoryName"
            [(ngModel)]="Name"
            placeholder="Enter category name"
            [maxlength]="200"
            [class.invalid]="Errors['name']" />
          @if (Errors['name']) {
            <span class="error-text">{{ Errors['name'] }}</span>
          }
        </div>

        <div class="form-group">
          <label for="categoryDescription" class="form-label">
            Description
          </label>
          <textarea class="mj-textarea"
            id="categoryDescription"
            [(ngModel)]="Description"
            placeholder="Optional description for this category"
            [rows]="3"
            [maxlength]="1000"></textarea>
        </div>

        <div class="form-group">
          <label for="categoryParent" class="form-label">
            Parent Category
          </label>
          <mj-dropdown
            [(ngModel)]="ParentID"
            [Data]="getParentOptions()"
            TextField="text"
            ValueField="value"
            [ValuePrimitive]="true">
          </mj-dropdown>
          <span class="help-text">
            Leave empty to create a root-level category
          </span>
        </div>
      </div>

      <div class="panel-footer">
        <button mjButton
          variant="primary"
          [disabled]="IsSaving"
          (click)="onSave()">
          @if (IsSaving) {
            <i class="fa-solid fa-spinner fa-spin"></i>
            Creating...
          } @else {
            <i class="fa-solid fa-check"></i>
            Create Category
          }
        </button>
        <button mjButton
          variant="outline"
          [disabled]="IsSaving"
          (click)="onClose()">
          Cancel
        </button>
      </div>
    </div>
  </div>
}
