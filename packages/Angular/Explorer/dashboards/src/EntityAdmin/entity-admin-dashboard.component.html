<mj-page-layout>
  <mj-page-header
    Title="Entity Admin"
    Icon="fa-solid fa-database"
    Subtitle="Browse and configure entity definitions">
    <div meta>
      <mj-stat-badge [Count]="filteredEntities.length" Label="visible entities"></mj-stat-badge>
    </div>
    <div actions>
      <button
        mjButton
        [variant]="filterPanelVisible ? 'primary' : 'secondary'"
        size="sm"
        (click)="toggleFilterPanel()"
        title="Toggle Filters">
        <i class="fa-solid fa-filter"></i> Filters
      </button>
    </div>
  </mj-page-header>

  <mj-page-body [Flex]="true" [Padding]="false">
    @if (isLoading) {
      <div class="loading-container">
        <mj-loading [text]="loadingMessage" size="large"></mj-loading>
      </div>
    }

    @if (error) {
      <div class="error-container">
        <p class="error-message">{{ error }}</p>
      </div>
    }

    @if (!isLoading && !error) {
      <div class="dashboard-content">
        <mj-erd-composite
          #erdComposite
          [isRefreshingERD]="isRefreshingERD"
          (stateChange)="onStateChange($event)"
          (userStateChange)="onUserStateChange($event)"
          (entityOpened)="onEntityOpened($event)"
          (openRecord)="onOpenRecord($event)"
          >
        </mj-erd-composite>
      </div>
    }
  </mj-page-body>
</mj-page-layout>
