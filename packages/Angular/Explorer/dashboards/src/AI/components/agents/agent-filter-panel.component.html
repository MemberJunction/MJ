<div class="filter-panel">
  <div class="filter-panel-header">
    <h3>Agent Filters</h3>
    <div class="filter-summary-inline">
      <span class="summary-value">{{ filteredAgents.length }}</span>
      <span class="summary-label">of {{ agents.length }}</span>
    </div>
    <button class="close-btn" (click)="toggleFilterPanel()">
      <span class="fa-solid fa-times"></span>
    </button>
  </div>
  
  <div class="filter-content">
    <!-- Search input is surfaced in the page-header toolbar, not duplicated here -->

    <!-- Category Filter (TreeDropdown) -->
    <div class="filter-group">
      <label class="filter-label">
        <span class="fa-solid fa-folder-tree"></span>
        Category
      </label>
      <mj-tree-dropdown
        [BranchConfig]="CategoryBranchConfig"
        [Value]="SelectedCategoryKey"
        SelectionMode="single"
        SelectableTypes="branch"
        Placeholder="All Categories"
        [Clearable]="true"
        [EnableSearch]="true"
        (ValueChange)="onCategoryChange($event)">
      </mj-tree-dropdown>
    </div>

    <!-- Agent Type Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <span class="fa-solid fa-robot"></span>
        Type
      </label>
      <mj-dropdown
        [Data]="agentTypeOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [(ngModel)]="filters.agentType"
        (ngModelChange)="onFilterChange()">
      </mj-dropdown>
    </div>

    <!-- Parent Agent Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <span class="fa-solid fa-sitemap"></span>
        Parent
      </label>
      <mj-dropdown
        [Data]="parentAgentOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [Filterable]="parentAgentOptions.length > 10"
        [(ngModel)]="filters.parentAgent"
        (ngModelChange)="onFilterChange()">
      </mj-dropdown>
    </div>

    <!-- Status Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <span class="fa-solid fa-toggle-on"></span>
        Status
      </label>
      <mj-dropdown
        [Data]="statusOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [(ngModel)]="filters.status"
        (ngModelChange)="onFilterChange()">
      </mj-dropdown>
    </div>

    <!-- Execution Mode Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <span class="fa-solid fa-list-ol"></span>
        Execution Mode
      </label>
      <mj-dropdown
        [Data]="executionModeOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [(ngModel)]="filters.executionMode"
        (ngModelChange)="onFilterChange()">
      </mj-dropdown>
    </div>

    <!-- Expose As Action Filter -->
    <div class="filter-group">
      <label class="filter-label">
        <span class="fa-solid fa-share"></span>
        Action Exposure
      </label>
      <mj-dropdown
        [Data]="exposeAsActionOptions"
        TextField="text"
        ValueField="value"
        [ValuePrimitive]="true"
        [(ngModel)]="filters.exposeAsAction"
        (ngModelChange)="onFilterChange()">
      </mj-dropdown>
    </div>
    
    <!-- Reset Button -->
    <div class="filter-actions">
      <button class="reset-btn" (click)="resetAllFilters()" title="Reset all filters">
        <span class="fa-solid fa-undo"></span>
        Reset Filters
      </button>
    </div>
  </div>
</div>
