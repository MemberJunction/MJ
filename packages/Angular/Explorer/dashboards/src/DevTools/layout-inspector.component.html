<div class="mj-inspector mj-inspector--solo">
    <mj-page-header-interior
        Role="region"
        AriaLabel="Layout inspector"
        Title="Layout Inspector"
        Subtitle="Workspace + Golden Layout configuration">
        <div actions>
            <mj-refresh-button [Loading]="false" (Clicked)="refresh()"></mj-refresh-button>
            <button mjButton
                    [variant]="CopyConfirmed ? 'success' : 'secondary'"
                    size="sm"
                    (click)="OnCopy()"
                    [title]="CopyConfirmed ? 'Copied' : 'Copy JSON'">
                <i class="fa-solid" [class.fa-clipboard]="!CopyConfirmed" [class.fa-check]="CopyConfirmed" aria-hidden="true"></i>
                {{ CopyConfirmed ? 'Copied' : 'Copy' }}
            </button>
            <button mjButton variant="secondary" size="sm" (click)="OnDownload()" title="Download as JSON" aria-label="Download as JSON">
                <i class="fa-solid fa-download" aria-hidden="true"></i>
            </button>
        </div>
        <div toolbar>
            <mj-tab-nav
                [Tabs]="tabsConfig"
                [ActiveKey]="ActiveSection"
                (TabChange)="onTabChange($event)">
            </mj-tab-nav>
        </div>
    </mj-page-header-interior>

    <div class="mj-inspector__content">
        <div class="mj-inspector__content-head">
            <h4 class="mj-inspector__content-title">{{ SectionLabel }}</h4>
            <span class="mj-inspector__content-meta">Refreshed {{ LastRefreshedLabel }}</span>
        </div>
        <div class="mj-inspector__editor">
            <mj-code-editor
                [(ngModel)]="LayoutJson"
                [language]="'json'"
                [readonly]="true"
                [lineWrapping]="true">
            </mj-code-editor>
        </div>
    </div>
</div>
