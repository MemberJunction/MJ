<div class="ai-assistant-panel">
  <!-- Header: title + collapse. Style + classes match the prior bespoke
       chat so the panel chrome lines up with the rest of the cockpit. -->
  <div class="panel-header">
    <div class="header-title">
      <i class="fa-solid fa-robot"></i>
      <span>AI Assistant</span>
    </div>
    <button class="collapse-btn" (click)="OnCollapsePanel()" title="Collapse panel">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>

  <!-- Quick Actions: clicking a button stuffs the canned prompt into
       `PendingMessage`, which the chat-area below picks up on its next
       render cycle and sends as if the user typed it. Same mechanism the
       SendErrorToAI handler uses. "Fix Errors" disables until an error
       has actually been observed in the runtime preview. -->
  <div class="quick-actions">
    @for (action of QuickActions; track action.Label) {
      <button
        class="quick-action-btn"
        [class.disabled]="!IsQuickActionEnabled(action)"
        [disabled]="!IsQuickActionEnabled(action)"
        (click)="OnQuickAction(action)"
        [title]="action.Label">
        <i class="fa-solid {{ action.Icon }}"></i>
        <span>{{ action.Label }}</span>
      </button>
    }
  </div>

  <!-- Embedded chat-area — same primitive the main Chat app and the Form
       Builder cockpit use. Conversations here are scoped to the
       Component Studio app so they don't pollute main chat; the default
       agent is Codesmith (resolved at init from the AIEngineBase cache);
       and the conversation-header agent picker stays enabled so the user
       can switch on the fly. -->
  <div class="chat-host">
    @if (CurrentUser) {
      <mj-conversation-chat-area
        [Provider]="Provider"
        [environmentId]="EnvironmentId"
        [currentUser]="CurrentUser"
        [conversationId]="ChatConversationId"
        [conversation]="ChatConversation"
        [isNewConversation]="ChatIsNewConversation"
        [pendingMessage]="PendingMessage"
        [pendingAttachments]="PendingAttachments"
        [threadId]="ChatThreadId"
        [pendingArtifactId]="ChatPendingArtifactId"
        [pendingArtifactVersionNumber]="ChatPendingArtifactVersionNumber"
        [overlayMode]="true"
        [showExportButton]="false"
        [showShareButton]="false"
        [showArtifactIndicator]="false"
        [appContext]="$any(ChatAppContext)"
        [defaultAgentId]="CodesmithAgentId"
        [applicationScope]="'Application'"
        [applicationId]="CockpitApplicationId"
        [emptyStateGreeting]="'How can I help with this component?'"
        (conversationCreated)="OnConversationCreated($event)"
        (pendingMessageConsumed)="OnPendingMessageConsumed()"
        (openEntityRecord)="OnOpenEntityRecord($event)"
        (navigationRequest)="OnNavigationRequest($event)"
        (taskClicked)="OnTaskClicked($event)"
        (artifactLinkClicked)="OnArtifactLinkClicked($event)"
        (conversationRenamed)="OnConversationRenamed($event)"
        (threadOpened)="OnThreadOpened($event)"
        (threadClosed)="OnThreadClosed()"
        (pendingArtifactConsumed)="OnPendingArtifactConsumed()">
      </mj-conversation-chat-area>
    } @else {
      <div class="chat-host__empty">Loading…</div>
    }
  </div>
</div>
