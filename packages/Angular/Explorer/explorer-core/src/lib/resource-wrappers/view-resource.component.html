<div #container class="view-resource-container">
    @if (isLoading) {
        <div class="view-loading-state">
            <mj-loading text="Loading view..." size="large"></mj-loading>
        </div>
    } @else if (errorMessage) {
        <div class="view-error-state">
            <i class="fas fa-exclamation-triangle"></i>
            <p>{{ errorMessage }}</p>
        </div>
    } @else if (entityInfo) {
        <!-- Header with title and action buttons -->
        <div class="view-header">
            <div class="header-left">
                <h2 class="view-title">{{ viewEntity?.Name || entityInfo.Name }}</h2>
                @if (viewEntity?.Description) {
                    <p class="view-description">{{ viewEntity!.Description }}</p>
                }
            </div>
            <div class="header-right">
                <!-- Create New Record Button -->
                <button
                    class="action-button create-button"
                    (click)="onCreateNewRecord()"
                    title="Create new {{ entityInfo.Name }} record">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Record</span>
                </button>

                <!-- Save as List Button — only meaningful for saved (non-dynamic) views. -->
                @if (viewEntity?.ID) {
                    <button
                        class="action-button save-as-list-button"
                        (click)="onSaveAsList()"
                        [disabled]="isSavingAsList"
                        title="Materialize these results as a static List">
                        @if (isSavingAsList) {
                            <i class="fa-solid fa-spinner fa-spin"></i>
                        } @else {
                            <i class="fa-solid fa-floppy-disk"></i>
                        }
                        <span>{{ isSavingAsList ? 'Saving...' : 'Save as List' }}</span>
                    </button>
                }

                <!-- Export Button -->
                <button
                    class="action-button export-button"
                    (click)="onExport()"
                    [disabled]="isExporting"
                    title="Export to Excel">
                    @if (isExporting) {
                        <i class="fa-solid fa-spinner fa-spin"></i>
                    } @else {
                        <i class="fa-solid fa-file-excel"></i>
                    }
                    <span>{{ isExporting ? 'Exporting...' : 'Export' }}</span>
                </button>
            </div>
        </div>

        <!-- Entity Viewer -->
        <mj-entity-viewer
            #entityViewer
            [entity]="entityInfo"
            [viewEntity]="viewEntity"
            [gridState]="gridState"
            [viewMode]="configuredViewMode"
            [ViewTypeID]="configuredViewTypeId"
            [ViewTypeConfigs]="viewTypeConfigs"
            [mapRenderMode]="configuredMapRenderMode"
            (recordOpened)="onRecordOpened($any($event))"
            (ViewTypeChange)="onViewTypeChange($event)"
            (ViewTypeConfigChange)="onViewTypeConfigChange($event)"
            (dataLoaded)="onDataLoaded()">
        </mj-entity-viewer>

        <!-- Save-as-List dialog -->
        <mj-save-view-as-list-dialog
            [Provider]="ProviderToUse"
            [Visible]="saveAsListDialogVisible"
            [ViewId]="viewEntity?.ID ?? null"
            [ViewName]="viewEntity?.Name ?? null"
            [RecordCount]="saveAsListRecordCount"
            (Save)="onSaveAsListSubmit($event)"
            (Cancel)="onSaveAsListCancelled()">
        </mj-save-view-as-list-dialog>
    }
</div>
