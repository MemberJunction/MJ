<div class="edit-dashboard-overlay"></div>
<mj-window
  [Visible]="true"
  [Width]="500"
  [MinHeight]="300"
  [MinWidth]="400"
  [Resizable]="true"
  (Close)="closeDialog()"
  [State]="'maximized'"
  Title="Customize Dashboard">
  <div class="custom-dialog-body">
    <div class="dialog-content">
      <div class="dialog-actions">
        <div class="add-dropdown-wrapper">
          <button mjButton variant="primary" (click)="toggleAddMenu()">
            <span class="fa-solid fa-plus"></span>
            Add item
            <span class="fa-solid fa-chevron-down add-dropdown-arrow"></span>
          </button>
          @if (showAddMenu) {
            <div class="add-dropdown-panel">
              @for (rt of ResourceTypes; track rt.Name) {
                <div class="add-dropdown-item" (click)="onItemSelect(rt)">
                  <span class="add-dropdown-item-text">{{ rt.DisplayName }}</span>
                </div>
              }
            </div>
          }
        </div>
      </div>
      <div class="mj-tile-layout"
        [style.grid-template-columns]="'repeat(' + config.columns + ', 1fr)'"
        [style.grid-auto-rows]="config.rowHeight + 'px'">
        @for (item of _items; track item.uniqueId) {
          <div class="mj-tile-item"
            [style.grid-column]="item.col + ' / span ' + item.colSpan"
            [style.grid-row]="'span ' + item.rowSpan"
            [id]="item.uniqueId">
            <div class="mj-tile-header">
              <span class="mj-tile-header-title">{{item.title}}</span>
              <button mjButton class="remove-item-btn" (click)="removeItem(item)">
                <span class="fa-solid fa-xmark"></span>
              </button>
            </div>
            <div class="mj-tile-body">
              <!-- placeholder for resource preview -->
            </div>
          </div>
        }
      </div>
    </div>
    <div class="dialog-footer">
      <div class="dialog-footer-actions">
        <button mjButton (click)="closeDialog()" >
          <span class="fa-solid fa-xmark"></span>
          Cancel
        </button>
        <button mjButton (click)="saveChanges()">
          <span class="fa-solid fa-check"></span>
          Save
        </button>
      </div>
    </div>
  </div>
</mj-window>
