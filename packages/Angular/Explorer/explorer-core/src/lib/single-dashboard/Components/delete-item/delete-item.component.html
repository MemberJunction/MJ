<mj-dialog [Visible]="true" (Close)="closeDialog()">
    <p class="k-m-7.5 k-text-center">
        Are you sure you want to delete <b>{{dashboardItem?.title}}</b>?
    </p>
    <mj-dialog-actions>
        <button mjButton variant="primary" (click)="confirmDeleteItem()">
            <span class="fa-solid fa-check"></span> Yes
        </button>
        <button mjButton (click)="closeDialog()">
            <span class="fa-solid fa-xmark"></span> No
        </button>
    </mj-dialog-actions>
</mj-dialog>
