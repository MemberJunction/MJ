@if (isVisible) {
  <mj-dialog
    [Visible]="true"
    [Width]="500"
    (Close)="close()">
    <mj-dialog-titlebar>
      <div style="display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-folder-plus" style="color: #28a745;"></i>
        Create New Query Category
      </div>
    </mj-dialog-titlebar>
    <div style="padding: 20px;">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="categoryName" style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--mj-text-secondary);">
          <i class="fa-solid fa-tag"></i> Category Name <span style="color: #dc3545;">*</span>
        </label>
        <input class="mj-input"
          [(ngModel)]="categoryName"
          name="categoryName"
          placeholder="Enter category name..."
          style="width: 100%;" />
      </div>
      <div class="form-group">
        <label for="parentCategory" style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--mj-text-secondary);">
          <i class="fa-solid fa-folder-tree"></i> Parent Category (Optional)
        </label>
        <mj-dropdown
          [(ngModel)]="selectedParentId"
          name="parentCategory"
          [Data]="flattenedCategories"
          TextField="name"
          ValueField="id"
          [ValuePrimitive]="true"
          Placeholder="-- No Parent (Top Level) --"
          style="width: 100%;">
        </mj-dropdown>
        @if (selectedParentId) {
          <div style="margin-top: 8px; padding: 8px; background: var(--mj-bg-surface-sunken); border-radius: 4px; font-size: 0.85em; color: var(--mj-text-muted);">
            <i class="fa-solid fa-info-circle"></i>
            Full path: {{ getFullPath() }}
          </div>
        }
      </div>
    </div>
    <mj-dialog-actions>
      <button mjButton (click)="close()">
        <i class="fa-solid fa-times"></i> Cancel
      </button>
      <button mjButton
        variant="primary"
        [disabled]="!categoryName.trim() || isCreating"
        (click)="createCategory()">
        @if (isCreating) {
          <i class="fa-solid fa-spinner fa-spin"></i> Creating...
        } @else {
          <i class="fa-solid fa-check"></i> Create Category
        }
      </button>
    </mj-dialog-actions>
  </mj-dialog>
}
