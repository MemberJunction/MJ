@if (record) {
<mj-record-form-container [Record]="record" [FormComponent]="this"
    (Navigate)="OnFormNavigate($event)"
    (DeleteRequested)="OnDeleteRequested()"
    (FavoriteToggled)="OnFavoriteToggled()"
    (HistoryRequested)="OnHistoryRequested()"
    (ListManagementRequested)="OnListManagementRequested()">

    <mj-form-panel-slot Entity="{{record.EntityInfo.Name}}" Slot="before-fields" [Record]="record" [FormComponent]="this" [FormContext]="formContext"></mj-form-panel-slot>

    <!-- Identity Assignment -->
    <mj-collapsible-panel
        SectionKey="identityAssignment"
        SectionName="Identity Assignment"
        Icon="fa fa-link"
        [Form]="this"
        [FormContext]="formContext">
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="AgentID" Type="textbox" [EditMode]="EditMode" [FormContext]="formContext" LinkType="Record"></mj-form-field>
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="ProviderID" Type="textbox" [EditMode]="EditMode" [FormContext]="formContext" LinkType="Record"></mj-form-field>
    </mj-collapsible-panel>

    <!-- Identity Details -->
    <mj-collapsible-panel
        SectionKey="identityDetails"
        SectionName="Identity Details"
        Icon="fa fa-id-card"
        [Form]="this"
        [FormContext]="formContext">
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="IdentityType" Type="select" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="IdentityValue" Type="textbox" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="DisplayName" Type="textbox" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>

        <div class="bai-hint">
            <i class="fa-solid fa-circle-info"></i>
            <span>{{ IdentityTypeHint }}</span>
        </div>
    </mj-collapsible-panel>

    <!-- Identity Configuration -->
    <mj-collapsible-panel
        SectionKey="identityConfiguration"
        SectionName="Identity Configuration"
        Icon="fa fa-sliders-h"
        [Form]="this"
        [FormContext]="formContext">
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="IsActive" Type="checkbox" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="Configuration" Type="code" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>
    </mj-collapsible-panel>

    <!-- System Metadata -->
    <mj-collapsible-panel
        SectionKey="systemMetadata"
        SectionName="System Metadata"
        Icon="fa fa-cog"
        [Form]="this"
        [FormContext]="formContext"
        [DefaultExpanded]="false">
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="__mj_CreatedAt" Type="textbox" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>
        <mj-form-field [Record]="record" [ShowLabel]="true" FieldName="__mj_UpdatedAt" Type="textbox" [EditMode]="EditMode" [FormContext]="formContext"></mj-form-field>
    </mj-collapsible-panel>

    <mj-form-panel-slot Entity="{{record.EntityInfo.Name}}" Slot="after-fields" [Record]="record" [FormComponent]="this" [FormContext]="formContext"></mj-form-panel-slot>

    <mj-form-panel-slot Entity="{{record.EntityInfo.Name}}" Slot="after-related" [Record]="record" [FormComponent]="this" [FormContext]="formContext"></mj-form-panel-slot>
</mj-record-form-container>
}
