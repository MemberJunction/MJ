@if (AgentID) {
    <mj-flow-agent-editor
        [AgentID]="AgentID"
        [EditMode]="EditMode"
        [FullScreen]="IsFullScreen"
        (FlowSaved)="OnFlowSaved()"
        (FullScreenToggled)="OnFullScreenToggled($event)">
    </mj-flow-agent-editor>
} @else {
    <mj-empty-state
        class="flow-empty-state"
        Variant="warning"
        Icon="fa-solid fa-circle-info"
        Title="Save the agent first to configure the workflow." />
}
