@if (Visible) {
  <mj-dialog
    [Visible]="true"
    [Title]="Title"
    [Width]="Width"
    [Height]="Height"
    (Close)="CloseWindow('Cancel')">
    <ng-template #dynamicFormContainer></ng-template>
    @if (ShowSaveButton || ShowCancelButton) {
      <mj-dialog-actions>
        @if (ShowSaveButton) {
          <button mjButton variant="primary" (click)="CloseWindow('Save')">Save</button>
        }
        @if (ShowCancelButton) {
          <button mjButton (click)="CloseWindow('Cancel')">Cancel</button>
        }
      </mj-dialog-actions>
    }
  </mj-dialog>
}
