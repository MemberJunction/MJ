<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MemberJunction Explorer</title>
  <base href="/" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    Theme pre-paint — sets data-theme="dark" on <html> BEFORE Angular
    boots so the first frame paints with the user's saved theme instead
    of flashing light first. Reads 'mj-theme', the unified key written by
    both ThemeService (post-login) and the login-screen toggle. Falls back
    to OS prefers-color-scheme on true first visits. Wrapped in try/catch
    so localStorage exceptions (Safari private mode, disabled storage) can
    never block app load.
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('mj-theme');
        var isDark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) { /* swallow — theme just falls back to light */ }
    })();
  </script>
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css?family=Ubuntu&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <!-- Leaflet for map view -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <!-- Leaflet MarkerCluster for grouping dense markers -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
  <!--
    MarkerCluster is a Leaflet UMD plugin: it must attach to the global `L`
    that core Leaflet defines. Loading it as a plain <script> during <head>
    parse is fragile in some app/bundler boot sequences — the plugin's UMD
    wrapper can resolve to a non-browser (AMD/CommonJS) target instead of
    window.L, so it loads with no error yet never registers
    L.markerClusterGroup, and map clustering silently falls back to plain
    markers. Deferring the load until after `window.load` (when core Leaflet
    and the global environment have settled) forces the browser-global branch
    and makes attachment reliable across deployments.
  -->
  <script>
    (function () {
      function loadMarkerCluster() {
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js';
        s.crossOrigin = '';
        s.onload = function () {
          if (typeof L === 'undefined' || typeof L.markerClusterGroup !== 'function') {
            console.warn('[map] leaflet.markercluster loaded but did not attach to global L; clustering disabled.');
          }
        };
        s.onerror = function () {
          console.warn('[map] failed to load leaflet.markercluster; clustering disabled.');
        };
        document.head.appendChild(s);
      }
      if (document.readyState === 'complete') {
        loadMarkerCluster();
      } else {
        window.addEventListener('load', loadMarkerCluster);
      }
    })();
  </script>
</head>
<body>
<app-root></app-root> 
<app-redirect></app-redirect>
</body>
</html>
