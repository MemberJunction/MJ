name: Check Dependencies

on:
  pull_request:
    branches:
      - next
    paths:
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - 'packages/**/package.json'
      - 'package.json'
      - 'package-lock.json'

jobs:
  check-dependencies:
    name: Detect missing and unused dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Knip dependency check
        id: knip
        run: |
          echo "Running Knip to check for missing dependencies..."
          # Capture stdout and stderr separately so a knip crash doesn't masquerade
          # as "no issues found" (which is what happened for months — see 5.25.0 postmortem).
          set +e
          NO_COLOR=1 npx knip --include unlisted --reporter compact > knip-report.txt 2> knip-stderr.txt
          KNIP_EXIT=$?
          set -e

          # Display the raw report
          cat knip-report.txt

          # Detect knip infrastructure failures (exit code 2 = crash, not "issues found")
          if [ $KNIP_EXIT -eq 2 ]; then
            echo ""
            echo "::error::Knip crashed during analysis (exit code 2). Stderr:"
            cat knip-stderr.txt
            echo "knip_crashed=true" >> $GITHUB_OUTPUT
          else
            echo "knip_crashed=false" >> $GITHUB_OUTPUT
            # Show stderr warnings if any (non-fatal)
            if [ -s knip-stderr.txt ]; then
              echo ""
              echo "Knip warnings:"
              cat knip-stderr.txt
            fi
          fi

      - name: Fail fast if Knip crashed
        if: steps.knip.outputs.knip_crashed == 'true'
        run: |
          echo "❌ Knip failed to run. The dependency check is broken and must be fixed."
          echo "   This prevents silent accumulation of missing dependencies."
          echo ""
          echo "   See the knip-stderr.txt artifact for details."
          exit 1

      - name: Format report
        if: steps.knip.outputs.knip_crashed != 'true'
        run: node scripts/format-knip-report.mjs knip-report.txt > formatted-report.md

      - name: Check for actual issues
        id: check_issues
        if: steps.knip.outputs.knip_crashed != 'true'
        run: |
          # Check the formatted report to see if there are actual missing dependencies
          # after filtering out false positives
          if grep -q "Found \*\*[1-9][0-9]* missing dependencies\*\*" formatted-report.md; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "⚠️ Missing dependencies detected after filtering"
          elif grep -q "Found \*\*0 missing dependencies\*\*" formatted-report.md; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "✅ No real missing dependencies (false positives filtered out)"
          elif grep -q "All dependencies are properly declared" formatted-report.md; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "✅ No missing dependencies found"
          else
            # Unknown output format — fail safe rather than silently passing
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "⚠️ Could not determine dependency status — treating as failure"
          fi

      - name: Comment PR with results
        if: steps.knip.outputs.knip_crashed != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('formatted-report.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- dependency-check-report -->')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload Knip report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knip-report
          path: |
            knip-report.txt
            knip-stderr.txt
          retention-days: 30

      - name: Fail if missing dependencies found
        if: steps.check_issues.outputs.has_issues == 'true'
        run: |
          echo "❌ Missing dependencies detected! Please run 'npm run deps:fix-missing' locally to fix."
          echo ""
          echo "See the PR comment above for details on which dependencies are missing."
          exit 1
