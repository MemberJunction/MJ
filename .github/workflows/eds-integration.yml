name: External Data Sources integration

# Runs the PostgreSQL reference-driver integration tests against a REAL Postgres,
# proving the live-read path (RunView / native query / LoadSingle / IntrospectSchema)
# end-to-end. The driver-level tests are opt-in (RUN_PG_INTEGRATION=1) so the normal
# unit-test gate stays DB-free; this workflow provides the DB and flips the flag.
#
# The test suite SELF-SEEDS its `demo` schema (customers/orders + a view) in beforeAll,
# so the service container below is a blank Postgres — no seed step needed and the run
# is deterministic.

on:
  workflow_dispatch: # manual trigger
  pull_request:
    branches: [next]
    paths:
      - 'packages/ExternalDataSources/**'
      - 'packages/GenericDatabaseProvider/**'
      - 'packages/MJCore/src/generic/externalDataSourceReadRouter.ts'
      - 'packages/MJCore/src/generic/externalDataSourceTypes.ts'
      - '.github/workflows/eds-integration.yml'
  push:
    branches: [next]
    paths:
      - 'packages/ExternalDataSources/**'
      - '.github/workflows/eds-integration.yml'

jobs:
  pg-driver-integration:
    name: Postgres reference driver (integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: eds_ci
          POSTGRES_PASSWORD: eds_ci_pass
          POSTGRES_DB: eds_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eds_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Turbo builds the driver package plus its full transitive dep graph
      # (Engine, MJCore, core-entities, credentials, …) so the test can resolve
      # the @memberjunction/* imports from their built dist/.
      - name: Build Postgres external driver
        run: npx turbo build --filter=@memberjunction/external-data-source-postgres

      # The suite self-seeds the `demo` schema, so we only point it at the blank
      # service container. RUN_PG_INTEGRATION=1 flips describe.runIf() on.
      - name: Run Postgres driver integration tests
        working-directory: packages/ExternalDataSources/Providers/Postgres
        env:
          RUN_PG_INTEGRATION: '1'
          PG_HOST: localhost
          PG_PORT: '5432'
          PG_DATABASE: eds_ci
          PG_USER: eds_ci
          PG_PASSWORD: eds_ci_pass
        run: npm run test
