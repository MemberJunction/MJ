name: Claude Pack — dist freshness

# Gate that fails when templates/claude-pack/dist/ is stale relative to the
# pack source. Whoever changes a file under templates/claude-pack/{core,
# versions,commands,skills}/, the templates, or build-pack.mjs MUST rerun
# `npm run claude-pack:build` and commit the regenerated dist/ alongside.
#
# Path-filtered to only run when pack source or this workflow changes — keeps
# unrelated PRs from waiting on it. Structurally modeled on pg-migrations.yml.

on:
  workflow_dispatch:
  pull_request:
    branches: [next]
    paths:
      - 'templates/claude-pack/**'
      - 'packages/MJInstaller/src/distribution/**'
      - 'packages/MJCLI/src/commands/bundle/**'
      - 'scripts/verify-bundle-smoke.mjs'
      - '.github/workflows/claude-pack.yml'
  push:
    branches: [next]
    paths:
      - 'templates/claude-pack/**'
      - 'packages/MJInstaller/src/distribution/**'
      - 'packages/MJCLI/src/commands/bundle/**'
      - 'scripts/verify-bundle-smoke.mjs'
      - '.github/workflows/claude-pack.yml'

jobs:
  verify-dist-fresh:
    name: Verify dist is up to date
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # The build script has no npm dependencies of its own — it only uses
      # node:fs / node:crypto / node:path. We still need the lockfile install
      # so `npm run claude-pack:build` finds the script entry; skipping it
      # would still work but `npm ci --ignore-scripts` is essentially free
      # given the cache and gives consistent behavior.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild claude-pack
        run: npm run claude-pack:build

      - name: Verify dist/ is in sync with source
        run: |
          if git diff --exit-code templates/claude-pack/dist/; then
            echo "::notice::templates/claude-pack/dist/ is in sync with source"
          else
            echo "::error::templates/claude-pack/dist/ is stale."
            echo "::error::Run 'npm run claude-pack:build' locally and commit the regenerated dist/ alongside your source changes."
            git diff --stat templates/claude-pack/dist/ >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────
  # End-to-end smoke test for `mj bundle` — the offline/air-gapped install
  # ZIP path introduced by PR #2725 (RepoFetcher + DistributionAssembler),
  # which replaced the legacy committed bootstrap ZIP.
  #
  # The old `e2e-bootstrap-zip` job in this workflow built a ZIP via the
  # deleted `CreateMJDistribution.js` and asserted the Claude pack landed
  # inside it. Post-#2725 there is no longer a pack-in-ZIP path — `mj install`
  # fetches the repo via sparse-checkout and `mj install:claude` is a
  # separate command that installs the pack independently. So the new
  # equivalent of "make sure the offline-install zip round-trips correctly"
  # is to exercise `mj bundle --source .` end-to-end and verify the produced
  # zip has the expected distribution layout (apps/MJAPI, apps/MJExplorer,
  # SQL Scripts, root package.json/mj.config.cjs/install.config.json).
  #
  # MJInstaller has unit tests for the assembler (createBundle.test.ts), so
  # the value this CI job adds beyond those is: it builds and runs the real
  # compiled `mj` CLI against the working tree, catching breakage in the
  # CLI ↔ installer integration that unit tests don't see.
  # ───────────────────────────────────────────────────────────────────────
  e2e-bundle-smoke:
    name: E2E mj bundle round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # Build only what `mj bundle` needs: MJInstaller (assembler + RepoFetcher)
      # and MJCLI (the command entry point). Turbo picks up their transitive
      # dependencies. This is faster than a full repo build but still gives us
      # real compiled binaries.
      - name: Build MJInstaller + MJCLI
        run: npx turbo run build --filter=@memberjunction/installer --filter=@memberjunction/cli

      - name: Build mj bundle from local source
        run: |
          mkdir -p Distributions
          node packages/MJCLI/bin/run.js bundle --source . --out Distributions/MJ_Bundle_CI.zip

      - name: Verify bundle structure
        run: node scripts/verify-bundle-smoke.mjs Distributions/MJ_Bundle_CI.zip
