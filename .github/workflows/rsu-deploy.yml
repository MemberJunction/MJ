name: RSU Explorer Deploy

# Triggers when an RSU branch merges to the target branch.
# MJAPI and the database are already updated by the RSU pipeline on the server.
# This workflow only rebuilds and redeploys MJExplorer so the UI picks up
# the new Angular form components generated by CodeGen.

on:
  push:
    branches:
      - next
    paths:
      - 'packages/Angular/Explorer/core-entity-forms/src/lib/generated/**'
      - 'packages/MJExplorer/src/app/generated/**'

concurrency:
  group: rsu-explorer-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-explorer:
    name: Rebuild & deploy MJExplorer
    runs-on: ubuntu-24.04
    if: contains(github.event.head_commit.message, 'RSU:')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MJExplorer
        run: npx turbo run build --filter=mj_explorer

      # Deploy step — environment-specific.
      # Replace with your deployment target (Azure Static Web Apps, S3, Docker, etc.)
      - name: Deploy MJExplorer
        run: |
          echo "TODO: Replace with your Explorer deployment command"
          echo "Examples:"
          echo "  Azure: az staticwebapp deploy --app-name myapp --output-location dist/"
          echo "  Docker: docker build -t explorer . && docker push"
          echo "  S3: aws s3 sync dist/ s3://my-bucket/"

      # Notify the MJAPI instance that canonical deployment is live.
      # This clears the "out of sync" indicator in the UI.
      - name: Clear out-of-sync flag
        if: success()
        run: |
          if [ -n "$MJAPI_URL" ]; then
            curl -sf -X POST "$MJAPI_URL" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { ClearRSUOutOfSync }"}' || true
          fi
        env:
          MJAPI_URL: ${{ secrets.MJAPI_GRAPHQL_URL }}
