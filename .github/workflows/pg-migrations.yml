name: PostgreSQL migration parity

# Validates that T-SQL migrations convert cleanly to PostgreSQL and apply
# to a fresh PG database without errors. This is Phase C of the PG migration
# architecture plan — the "continuous build process" ensuring PG stays in sync.

on:
  workflow_dispatch: # Manual trigger for testing
  pull_request:
    branches: [next]
    paths:
      - 'migrations/**'
      - 'migrations-pg/**'
      - 'packages/SQLConverter/**'
      - 'packages/CodeGenLib/src/Database/providers/postgresql/**'
      - '.github/workflows/pg-migrations.yml'
  push:
    branches: [next]
    paths:
      - 'migrations/**'
      - 'migrations-pg/**'
      - 'packages/SQLConverter/**'

jobs:
  pg-parity:
    name: PG migration parity check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: mj_pg_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ─── Step 1: Validate PG migration filenames ─────────────────────
      - name: Validate PG migration filenames
        run: ./.github/scripts/validate-migration-filenames.sh migrations-pg/v5

      # ─── Step 2: Build SQLConverter (needed for conversion + dedup) ──
      # Install from root so workspace symlinks are set up, then use turbo
      # with --filter to build SQLConverter AND its workspace deps
      # (@memberjunction/sqlglot-ts, @memberjunction/sql-dialect) in the
      # correct order. Building SQLConverter in isolation fails because
      # tsc can't resolve the types of unbuilt workspace dependencies.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build SQLConverter (and workspace deps)
        run: npx turbo build --filter=@memberjunction/sql-converter

      # ─── Step 3: Verify committed PG migration files exist ──────────
      # Previously this step regenerated all V*.pg.sql from T-SQL via the
      # converter. We've moved away from regenerate-on-CI for two reasons:
      #
      #   1. Real `mj migrate` (the install path) applies the COMMITTED
      #      .pg.sql files as-is. Regenerating during CI tested something
      #      different from what users actually run.
      #   2. Some PG migrations have hand-fixes that the converter doesn't
      #      produce natively (managed-PG boolean rewrites, the
      #      vwEntityPermissions RoleName alias fix, the Scoped_EntityField_SPs
      #      hand-port). Regenerating overwrites those fixes.
      #
      # Coverage of the converter is preserved by:
      #   - packages/SQLConverter/src/__tests__/pg-migration-regression.test.ts
      #     (107 conversion tests + sequence-dedup + TODO-marker check)
      #   - The parity test in the same file (re-enabled) which enforces that
      #     every T-SQL V-migration has a committed PG counterpart.
      #
      # If migrations-pg/v5/ is empty (e.g. on a tooling-only PR before the
      # migrations PR has merged), this step skips the apply gracefully so the
      # workflow doesn't block. The actual coverage gate is the parity test.
      - name: Verify committed PG migration files
        id: verify_committed
        run: |
          PG_FILES=$(ls migrations-pg/v5/*.pg.sql migrations-pg/v5/*.pg-only.sql 2>/dev/null | wc -l)
          BASELINE=$(ls migrations-pg/v5/B*.pg.sql 2>/dev/null | head -1)
          echo "Committed PG migration files: $PG_FILES"
          echo "Baseline file: ${BASELINE:-(none)}"
          if [ "$PG_FILES" -eq 0 ]; then
            echo "::notice::No committed PG migration files — skipping apply step. Migration content lives in the companion PR."
            echo "skip_apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_apply=false" >> "$GITHUB_OUTPUT"
          fi

      # ─── Step 4: Bootstrap PG (roles + helper procs) ────────────────
      - name: Bootstrap PostgreSQL
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: testpass
          PGDATABASE: mj_pg_ci
        run: |
          # Create roles referenced by migration GRANT statements, plus a stub
          # of the Flyway/Skyway schema-history table. In real installs Skyway
          # creates this table at startup before applying any V-migration; CI
          # uses raw psql, so we have to mimic that bootstrap step. Without it,
          # any view that joins __mj.flyway_schema_history (e.g.
          # vwFlywayVersionHistoryParsed) fails to create with
          # `relation "__mj.flyway_schema_history" does not exist`.
          psql <<'SQL'
          DO $$ BEGIN CREATE ROLE "cdp_UI" NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE "cdp_Developer" NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE "cdp_Integration" NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          GRANT USAGE ON SCHEMA public TO "cdp_UI", "cdp_Developer", "cdp_Integration";

          CREATE SCHEMA IF NOT EXISTS __mj;
          CREATE TABLE IF NOT EXISTS __mj.flyway_schema_history (
              installed_rank INTEGER NOT NULL PRIMARY KEY,
              version VARCHAR(50),
              description VARCHAR(200) NOT NULL,
              type VARCHAR(20) NOT NULL,
              script VARCHAR(1000) NOT NULL,
              checksum INTEGER,
              installed_by VARCHAR(100) NOT NULL,
              installed_on TIMESTAMP NOT NULL DEFAULT now(),
              execution_time INTEGER NOT NULL,
              success BOOLEAN NOT NULL
          );
          SQL

      # ─── Step 5: Apply PG migrations ────────────────────────────────
      - name: Apply PG migrations
        id: apply
        if: steps.verify_committed.outputs.skip_apply != 'true'
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: testpass
          PGDATABASE: mj_pg_ci
        run: |
          # Resolve Flyway/Skyway placeholders in all migration files before applying
          # (Skyway does this at runtime; psql needs them pre-resolved)
          for f in migrations-pg/v5/*.sql; do
            sed -i 's/\${flyway:defaultSchema}/__mj/g' "$f"
          done

          # Apply baseline first
          BASELINE=$(ls migrations-pg/v5/B*.pg.sql 2>/dev/null | head -1)
          if [ -n "$BASELINE" ]; then
            echo "Applying baseline: $(basename $BASELINE)"
            psql -v ON_ERROR_STOP=0 -f "$BASELINE" > /dev/null 2>&1
            BASELINE_EXIT=$?
            if [ $BASELINE_EXIT -ne 0 ]; then
              echo "::warning::Baseline had non-fatal errors (expected — some procs may fail on first run)"
            fi
          fi

          # Determine baseline timestamp — V-migrations with timestamps <= baseline
          # are already included in the baseline and should be skipped (same as Skyway behavior)
          BASELINE_TS=""
          if [ -n "$BASELINE" ]; then
            BASELINE_NAME=$(basename "$BASELINE")
            BASELINE_TS=$(echo "$BASELINE_NAME" | grep -oP '(?<=^B)\d{12}')
            echo "Baseline timestamp: $BASELINE_TS — skipping V-migrations at or before this version"
          fi

          # Apply V-migrations in order, tracking results
          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED_BASELINE=0
          FAILED_FILES=""

          for f in $(ls migrations-pg/v5/V*.sql 2>/dev/null | sort); do
            FILENAME=$(basename "$f")

            # Skip V-migrations that predate the baseline (their content is already in the baseline)
            if [ -n "$BASELINE_TS" ]; then
              V_TS=$(echo "$FILENAME" | grep -oP '(?<=^V)\d{12}')
              if [ -n "$V_TS" ] && [ "$V_TS" -le "$BASELINE_TS" ]; then
                SKIPPED_BASELINE=$((SKIPPED_BASELINE + 1))
                continue
              fi
            fi

            TOTAL=$((TOTAL + 1))

            # Run with ON_ERROR_STOP to catch real failures
            if psql -v ON_ERROR_STOP=1 -f "$f" > /dev/null 2>&1; then
              PASSED=$((PASSED + 1))
            else
              # Some migrations call stored procs that may not exist yet (Metadata_Sync pattern)
              # Check if this is a known Metadata_Sync failure (contains stored proc calls)
              if grep -q 'SELECT __mj\."fn_create_\|SELECT __mj\."fn_update_\|SELECT __mj\."spCreate\|PERFORM __mj\.' "$f" 2>/dev/null; then
                echo "::notice::$FILENAME — skipped (Metadata_Sync: needs CodeGen before stored proc calls work)"
                PASSED=$((PASSED + 1))  # Count as passed — expected behavior
              else
                FAILED=$((FAILED + 1))
                FAILED_FILES="$FAILED_FILES\n  $FILENAME"
                echo "::error::$FILENAME — FAILED"
                # Show the actual error
                psql -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tail -5
              fi
            fi
          done

          echo ""
          echo "=== PG Migration Results ==="
          echo "  Total:   $TOTAL"
          echo "  Passed:  $PASSED"
          echo "  Failed:  $FAILED"
          echo "  Skipped (pre-baseline): $SKIPPED_BASELINE"

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED migration(s) failed:$FAILED_FILES"
            exit 1
          fi

          echo "pg_passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "pg_total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "baseline_ts=$BASELINE_TS" >> "$GITHUB_OUTPUT"

      # ─── Step 5b: Idempotency check (re-apply each V-migration) ─────
      # After step 5 succeeds, re-apply each V-migration on top of the
      # already-migrated database. Idempotent migrations succeed; non-
      # idempotent ones fail with errors like "column already exists",
      # "relation already exists", or UNIQUE constraint violations on
      # hardcoded INSERTs.
      #
      # The check exists because real users hit non-idempotent migrations
      # via two paths: (1) Skyway/Flyway repair after a partial-commit
      # failure (psql doesn't auto-wrap multi-statement scripts in
      # transactions, so a failure mid-file leaves prior statements
      # committed); (2) restoring from a backup taken mid-migration.
      #
      # Failure modes this catches that step 5 cannot:
      #   - ALTER TABLE ADD COLUMN without IF NOT EXISTS
      #   - CREATE INDEX without IF NOT EXISTS
      #   - CREATE TABLE without IF NOT EXISTS
      #   - INSERT without ON CONFLICT or IF-NOT-EXISTS guard
      #   - CREATE TRIGGER without prior DROP TRIGGER IF EXISTS
      #
      # Migrations that are intentionally non-idempotent can opt out by
      # including the marker `-- pg-test:non-idempotent <reason>` on a
      # comment line anywhere in the file. This keeps the gate honest
      # — if you opt out, the reason is right there in the file.
      #
      # Failures here are reported but do NOT fail the workflow yet
      # (continue-on-error: true) — first we need to see how dirty the
      # current PG migration set is. Once we triage existing migrations,
      # remove continue-on-error to make the gate enforced.
      - name: Verify migration idempotency (second-pass apply)
        id: idempotency
        if: steps.verify_committed.outputs.skip_apply != 'true'
        continue-on-error: true
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: testpass
          PGDATABASE: mj_pg_ci
          BASELINE_TS: ${{ steps.apply.outputs.baseline_ts }}
        run: |
          echo "=== Idempotency check: re-applying each V-migration ==="

          TOTAL=0
          IDEMPOTENT=0
          NOT_IDEMPOTENT=0
          ALLOWLISTED=0
          SKIPPED_BASELINE=0
          NON_IDEMPOTENT_FILES=""

          for f in $(ls migrations-pg/v5/V*.sql 2>/dev/null | sort); do
            FILENAME=$(basename "$f")

            # Skip pre-baseline V-migrations (same logic as first pass)
            if [ -n "$BASELINE_TS" ]; then
              V_TS=$(echo "$FILENAME" | grep -oP '(?<=^V)\d{12}')
              if [ -n "$V_TS" ] && [ "$V_TS" -le "$BASELINE_TS" ]; then
                SKIPPED_BASELINE=$((SKIPPED_BASELINE + 1))
                continue
              fi
            fi

            # Skip files explicitly opted out via the allowlist marker
            if grep -qE '^[[:space:]]*--[[:space:]]*pg-test:non-idempotent\b' "$f"; then
              ALLOWLISTED=$((ALLOWLISTED + 1))
              echo "::notice::$FILENAME — opted out via 'pg-test:non-idempotent' marker"
              continue
            fi

            # Skip Metadata_Sync-pattern files (sproc-call-driven, expected to
            # require CodeGen between runs — same exception step 5 makes)
            if grep -q 'SELECT __mj\."fn_create_\|SELECT __mj\."fn_update_\|SELECT __mj\."spCreate\|PERFORM __mj\.' "$f" 2>/dev/null; then
              ALLOWLISTED=$((ALLOWLISTED + 1))
              echo "::notice::$FILENAME — skipped (Metadata_Sync: stored-proc-call file, idempotency depends on CodeGen state)"
              continue
            fi

            TOTAL=$((TOTAL + 1))

            if psql -v ON_ERROR_STOP=1 -f "$f" > /dev/null 2>&1; then
              IDEMPOTENT=$((IDEMPOTENT + 1))
            else
              NOT_IDEMPOTENT=$((NOT_IDEMPOTENT + 1))
              NON_IDEMPOTENT_FILES="$NON_IDEMPOTENT_FILES\n  $FILENAME"
              echo "::warning::$FILENAME — NOT idempotent (failed on second apply)"
              # Surface the actual error for triage
              psql -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tail -3 | sed 's/^/    /'
            fi
          done

          echo ""
          echo "=== Idempotency Results ==="
          echo "  Checked:       $TOTAL"
          echo "  Idempotent:    $IDEMPOTENT"
          echo "  NOT idempotent: $NOT_IDEMPOTENT"
          echo "  Allowlisted:   $ALLOWLISTED"
          echo "  Pre-baseline:  $SKIPPED_BASELINE"

          {
            echo "## PG Migration Idempotency Report"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Migrations checked | $TOTAL |"
            echo "| Idempotent | $IDEMPOTENT |"
            echo "| **NOT idempotent** | **$NOT_IDEMPOTENT** |"
            echo "| Allowlisted (Metadata_Sync or marker) | $ALLOWLISTED |"
            if [ "$NOT_IDEMPOTENT" -gt 0 ]; then
              echo ""
              echo "### Non-idempotent migrations"
              echo ""
              printf '%s\n' "$NON_IDEMPOTENT_FILES" | sed 's/^/- /'
              echo ""
              echo "Each file above either needs defensive guards (\`IF NOT EXISTS\`, \`ON CONFLICT\`,"
              echo "\`OR REPLACE\`, etc.) OR an opt-out marker \`-- pg-test:non-idempotent <reason>\`"
              echo "if non-idempotency is intentional."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ $NOT_IDEMPOTENT -gt 0 ]; then
            printf "::warning::%d migration(s) are NOT idempotent. See step summary for details.\n" "$NOT_IDEMPOTENT"
            # Initially non-blocking via continue-on-error above. Once existing
            # migrations are triaged, remove continue-on-error to enforce.
          fi

          echo "not_idempotent=$NOT_IDEMPOTENT" >> "$GITHUB_OUTPUT"

      # ─── Step 6: Verify schema ──────────────────────────────────────
      - name: Verify PG schema
        if: steps.verify_committed.outputs.skip_apply != 'true'
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: testpass
          PGDATABASE: mj_pg_ci
        run: |
          echo "=== PG Schema Verification ==="

          TABLES=$(psql -tA -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = '__mj' AND table_type = 'BASE TABLE'")
          VIEWS=$(psql -tA -c "SELECT COUNT(*) FROM information_schema.views WHERE table_schema = '__mj'")
          FUNCTIONS=$(psql -tA -c "SELECT COUNT(*) FROM information_schema.routines WHERE routine_schema = '__mj' AND routine_type = 'FUNCTION'")

          echo "  Tables:    $TABLES"
          echo "  Views:     $VIEWS"
          echo "  Functions: $FUNCTIONS"

          # Minimum thresholds — if the schema has fewer objects than expected,
          # something went seriously wrong during migration
          MIN_TABLES=250
          MIN_VIEWS=200

          if [ "$TABLES" -lt "$MIN_TABLES" ]; then
            echo "::error::Expected at least $MIN_TABLES tables, got $TABLES"
            exit 1
          fi

          if [ "$VIEWS" -lt "$MIN_VIEWS" ]; then
            echo "::error::Expected at least $MIN_VIEWS views, got $VIEWS"
            exit 1
          fi

          echo "::notice::Schema verification passed: $TABLES tables, $VIEWS views, $FUNCTIONS functions"

      # ─── Step 7: Parity report ──────────────────────────────────────
      - name: Generate parity report
        if: always()
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: testpass
          PGDATABASE: mj_pg_ci
        run: |
          echo "## PostgreSQL Migration Parity Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          TABLES=$(psql -tA -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = '__mj' AND table_type = 'BASE TABLE'" 2>/dev/null || echo "N/A")
          VIEWS=$(psql -tA -c "SELECT COUNT(*) FROM information_schema.views WHERE table_schema = '__mj'" 2>/dev/null || echo "N/A")
          FUNCTIONS=$(psql -tA -c "SELECT COUNT(*) FROM information_schema.routines WHERE routine_schema = '__mj' AND routine_type = 'FUNCTION'" 2>/dev/null || echo "N/A")
          TRIGGERS=$(psql -tA -c "SELECT COUNT(DISTINCT trigger_name) FROM information_schema.triggers WHERE trigger_schema = '__mj'" 2>/dev/null || echo "N/A")

          echo "| Tables | $TABLES |" >> $GITHUB_STEP_SUMMARY
          echo "| Views | $VIEWS |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | $FUNCTIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggers | $TRIGGERS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated by \`pg-migrations.yml\` — Phase C of the PG migration architecture." >> $GITHUB_STEP_SUMMARY
