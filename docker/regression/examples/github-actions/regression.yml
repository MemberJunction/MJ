# Sample GitHub Actions workflow for running the MJ agentic test runner
# against your app. Copy this file into your repo's `.github/workflows/`
# directory and adjust the secrets + env vars to match your setup.
#
# What this workflow does:
#   1. Checks out your repo (which includes your tests + target profile).
#   2. Pulls `memberjunction/agentic-test-runner` from Docker Hub.
#   3. Runs the suite against your app — either at a remote URL (Mode B/C) or
#      against an app started in the same workflow (Mode D — see the `byo`
#      example below).
#   4. Uploads the run directory (results.json + report.html + screenshots) as
#      a build artifact.
#   5. Fails the workflow if any test regressed.
#
# You'll need these secrets configured on your repo:
#   ANTHROPIC_API_KEY    — Computer Use controller/judge LLM
#   APP_TEST_USER        — test account username (passed as MJ_TEST_VAR_authUsername)
#   APP_TEST_PASSWORD    — test account password
#
# Pin the runner image to a specific version (`memberjunction/agentic-test-runner:v5.30.0`)
# so the CI matrix is stable. Use `:latest` only for one-off experiments.

name: Regression Suite

on:
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 09:00 UTC against staging.
    - cron: "0 9 * * *"
  workflow_dispatch:

env:
  RUNNER_IMAGE: memberjunction/agentic-test-runner:v5.30.0

jobs:
  remote-target:
    # Mode B/C: drive tests against an already-deployed app.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull runner image
        run: docker pull "$RUNNER_IMAGE"

      - name: Run regression suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_TEST_USER: ${{ secrets.APP_TEST_USER }}
          APP_TEST_PASSWORD: ${{ secrets.APP_TEST_PASSWORD }}
        run: |
          mkdir -p test-results
          docker run --rm \
            -v "$(pwd)/test-results:/app/test-results" \
            -v "$(pwd)/tests:/app/byo-metadata" \
            -e ANTHROPIC_API_KEY \
            -e MJ_TEST_VAR_baseUrl="https://staging.my-app.example.com" \
            -e MJ_TEST_VAR_allowedDomains='["staging.my-app.example.com"]' \
            -e MJ_TEST_VAR_authUsername="$APP_TEST_USER" \
            -e MJ_TEST_VAR_authPassword="$APP_TEST_PASSWORD" \
            -e TEST_SUITE_NAME="My App Regression Suite" \
            -e EXTRA_METADATA_DIRS=/app/byo-metadata \
            "$RUNNER_IMAGE"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-run-${{ github.run_id }}
          path: test-results/run-*/
          retention-days: 30

  # Mode D variant — boot a release-candidate image alongside the runner.
  # Uncomment + adapt this job if you want to test ephemeral builds.
