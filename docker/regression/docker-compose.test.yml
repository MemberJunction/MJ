# MemberJunction Full-Stack Regression Test Environment
#
# Architecture:
#   sqlserver → db-setup (migrations + AssociationDB + CodeGen) → mjapi → mjexplorer → test-runner
#
# Usage (from repo root):
#   cp docker/regression/.env.test.example docker/regression/.env.test
#   npm run regression:build
#   npm run regression:up
#   npm run regression:down
#
# NOTE: Project name "mj-regression" and non-standard host ports (11433, 14000)
#       avoid conflicts with existing local containers.

name: mj-regression

x-db-env: &db-env
  DB_HOST: sqlserver
  DB_PORT: "1433"
  DB_USERNAME: sa
  DB_PASSWORD: "${TEST_SA_PASSWORD:-TestPassword123!}"
  DB_DATABASE: MemberJunction_Test
  DB_TRUST_SERVER_CERTIFICATE: "true"
  MJ_BASE_ENCRYPTION_KEY: "${MJ_BASE_ENCRYPTION_KEY:-}"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    user: root
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${TEST_SA_PASSWORD:-TestPassword123!}"
    ports:
      - "11433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C -No
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  db-setup:
    build:
      context: ../..
      dockerfile: docker/regression/Dockerfile.db-setup
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      <<: *db-env
      CODEGEN_DB_USERNAME: sa
      CODEGEN_DB_PASSWORD: "${TEST_SA_PASSWORD:-TestPassword123!}"

  # Form generator — opt-in service (profile: gen-forms) that runs codegen
  # against a temporary DB and writes Angular entity-form components to a
  # host bind-mount. The explorer Dockerfile picks them up at build time.
  # See docker/regression/.docker-generated/.gitignore for why this is laid
  # out the way it is.
  form-generator:
    profiles: ["gen-forms"]
    build:
      context: ../..
      dockerfile: docker/regression/Dockerfile.db-setup
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      <<: *db-env
      CODEGEN_DB_USERNAME: sa
      CODEGEN_DB_PASSWORD: "${TEST_SA_PASSWORD:-TestPassword123!}"
    entrypoint: ["/bin/bash", "/app/form-gen-entrypoint.sh"]
    volumes:
      - ./form-gen-entrypoint.sh:/app/form-gen-entrypoint.sh:ro
      # Override mj.config.cjs with one that includes the full Angular output
      # directives — the base MJAPI config strips them because production never
      # generates forms at runtime. We need them here.
      - ./form-gen.config.cjs:/app/mj.config.cjs:ro
      # Make the original docker/MJAPI/docker.config.cjs require()-able from
      # form-gen.config.cjs. The Dockerfile only COPYs it to /app/mj.config.cjs
      # (which we just shadowed), so we expose it again at its repo-relative
      # path inside the container.
      - ../MJAPI/docker.config.cjs:/app/docker/MJAPI/docker.config.cjs:ro
      - ./.docker-generated/MJExplorer-forms:/app/packages/MJExplorer/src/app/generated
      # The Angular forms import entity classes from mj_generatedentities
      # (packages/GeneratedEntities). CodeGen's EntitySubclasses output writes
      # those classes — capture them on the host so the explorer build picks
      # them up via Dockerfile.explorer's overlay COPY.
      - ./.docker-generated/GeneratedEntities:/app/packages/GeneratedEntities/src/generated
      # CodeGen's GraphQLServer output writes TypeGraphQL resolvers for non-core
      # entities (e.g. AssociationDemo). MJAPI compiles these into its bundle at
      # build time, so without them the GraphQL schema is missing types like
      # CreateAssociationDemoMemberInput and queries against demo entities fail
      # with 'Unknown type' / 'ID|null' errors.
      - ./.docker-generated/MJAPI-generated:/app/packages/MJAPI/src/generated

  mjapi:
    build:
      context: ../..
      dockerfile: docker/regression/Dockerfile.api
    depends_on:
      db-setup:
        condition: service_completed_successfully
    environment:
      <<: *db-env
      AUTH0_DOMAIN: "${AUTH0_DOMAIN:-}"
      AUTH0_CLIENT_ID: "${AUTH0_CLIENTID:-}"
      AUTH0_CLIENT_SECRET: "${AUTH0_CLIENT_SECRET:-}"
      GRAPHQL_PORT: "4000"
      NODE_ENV: test
    ports:
      - "14000:4000"
    # Auto-restart if MJAPI crashes (e.g. OOM under heavy regression load)
    # so the suite can continue rather than fail every remaining test.
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  mjexplorer:
    build:
      context: ../..
      dockerfile: docker/regression/Dockerfile.explorer
      args:
        AUTH0_DOMAIN: "${AUTH0_DOMAIN:-}"
        AUTH0_CLIENTID: "${AUTH0_CLIENTID:-}"
    depends_on:
      mjapi:
        condition: service_healthy
    ports:
      - "4200:4200"

  test-runner:
    build:
      context: ../..
      dockerfile: docker/regression/Dockerfile.test-runner
    depends_on:
      mjapi:
        condition: service_healthy
      mjexplorer:
        condition: service_started
    environment:
      <<: *db-env
      AUTH0_DOMAIN: "${AUTH0_DOMAIN:-}"
      AUTH0_CLIENT_ID: "${AUTH0_CLIENTID:-}"
      AUTH0_CLIENT_SECRET: "${AUTH0_CLIENT_SECRET:-}"
      TEST_UID: "${TEST_UID:-}"
      TEST_PWD: "${TEST_PWD:-}"
      AI_VENDOR_API_KEY__AnthropicLLM: "${ANTHROPIC_API_KEY:-}"
      AI_VENDOR_API_KEY__GeminiLLM: "${GOOGLE_API_KEY:-}"
      BASE_URL: "http://mjexplorer:4200"
      API_URL: "http://mjapi:4000"
      MAX_PARALLEL_WORKERS: "${MAX_PARALLEL_WORKERS:-4}"
    shm_size: '4gb'
    entrypoint: ["/bin/bash", "/app/test-runner-entrypoint.sh"]
    volumes:
      - ./test-results:/app/test-results
      - ./test-runner-entrypoint.sh:/app/test-runner-entrypoint.sh:ro
      # All of the entrypoint's Node helpers — DB ops, screenshot extraction,
      # md/html report generators, health monitor, etc. — live under scripts/
      - ./scripts:/app/docker/regression/scripts:ro
      - ../../metadata:/app/metadata
      - ./test-metadata:/app/test-metadata:ro
